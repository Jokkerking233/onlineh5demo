<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webtarget=out 跳转问题模拟 Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6f7; }
        
        .container { display: flex; height: 100vh; }
        
        /* 左侧导航 */
        .sidebar { width: 60px; background: #2b2b2b; display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 16px; }
        .sidebar .tab { width: 40px; height: 40px; border-radius: 8px; background: #3a3a3a; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #aaa; font-size: 12px; transition: all 0.2s; }
        .sidebar .tab:hover { background: #4a4a4a; }
        .sidebar .tab.active { background: #0052d9; color: #fff; }
        
        /* 主内容区 */
        .main { flex: 1; display: flex; flex-direction: column; }
        .toolbar { height: 40px; background: #fff; border-bottom: 1px solid #e5e5e5; display: flex; align-items: center; padding: 0 16px; gap: 8px; }
        .toolbar button { padding: 4px 12px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; }
        .toolbar button:hover { background: #f0f0f0; }
        .toolbar .url-bar { flex: 1; padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; color: #666; background: #f8f8f8; }
        
        .content { flex: 1; display: flex; flex-direction: column; }
        .webview-area { flex: 1; padding: 20px; overflow: auto; }
        
        /* 页面内容样式 */
        .page-a { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .page-a h2 { color: #333; margin-bottom: 16px; }
        .page-a p { color: #666; margin-bottom: 12px; line-height: 1.6; }
        .page-a .links { margin-top: 20px; }
        .page-a .links a { display: block; padding: 10px 16px; margin-bottom: 8px; background: #f0f7ff; border: 1px solid #b3d8ff; border-radius: 6px; color: #0052d9; text-decoration: none; transition: all 0.2s; }
        .page-a .links a:hover { background: #d9ecff; }
        
        /* 日志面板 */
        .log-panel { height: 220px; background: #1e1e1e; color: #d4d4d4; font-family: "Courier New", monospace; font-size: 12px; padding: 12px; overflow-y: auto; border-top: 2px solid #333; }
        .log-panel .log-entry { margin-bottom: 4px; padding: 2px 0; }
        .log-panel .log-warn { color: #e5c07b; }
        .log-panel .log-error { color: #e06c75; }
        .log-panel .log-info { color: #61afef; }
        
        /* 外部浏览器弹窗 */
        .external-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); padding: 30px; z-index: 1000; min-width: 420px; }
        .external-popup.show { display: block; }
        .external-popup h3 { margin-bottom: 12px; color: #333; }
        .external-popup p { color: #666; margin-bottom: 16px; word-break: break-all; }
        .external-popup button { padding: 8px 20px; background: #0052d9; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 999; }
        .overlay.show { display: block; }
        
        /* 状态指示 */
        .status-bar { height: 28px; background: #f8f8f8; border-top: 1px solid #e5e5e5; display: flex; align-items: center; padding: 0 12px; font-size: 11px; color: #999; gap: 20px; }
        .status-bar .status-item { display: flex; align-items: center; gap: 4px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-dot.green { background: #52c41a; }
        .status-dot.red { background: #ff4d4f; }

        .counter { background: #ff4d4f; color: #fff; border-radius: 10px; padding: 1px 6px; font-size: 10px; margin-left: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧 Tab 导航（模拟企微左侧栏） -->
        <div class="sidebar">
            <div class="tab" id="tab-chat" onclick="switchTab('chat')">消息</div>
            <div class="tab active" id="tab-workbench" onclick="switchTab('workbench')">工作台</div>
            <div class="tab" id="tab-contact" onclick="switchTab('contact')">通讯</div>
        </div>
        
        <!-- 主内容区 -->
        <div class="main">
            <div class="toolbar">
                <button onclick="goBack()">← 后退</button>
                <button onclick="refresh()">刷新</button>
                <div class="url-bar" id="urlBar">https://oa.example.com/workbench/home</div>
                <button onclick="resetDemo()" style="background:#fff3e6; border-color:#ffa940;">🔄 重置 Demo</button>
            </div>
            
            <div class="content">
                <div class="webview-area" id="webviewArea">
                    <!-- 动态内容 -->
                </div>
            </div>
            
            <div class="status-bar">
                <div class="status-item">
                    <span class="status-dot green" id="statusDot"></span>
                    <span id="workbenchStatus">enable_workbench_ = true</span>
                </div>
                <div class="status-item">
                    外部跳转次数：<span id="jumpCount">0</span>
                </div>
                <div class="status-item" id="sceneInfo">场景：正常加载</div>
            </div>
            
            <!-- 日志面板 -->
            <div class="log-panel" id="logPanel">
                <div class="log-entry log-info">[系统] Demo 已启动 — 模拟企微工作台 webtarget=out 导致每次点击都跳外部的 Bug</div>
                <div class="log-entry log-info">[说明] 工作台首页 urlA 中有链接/重定向到带 target=out 的 urlB</div>
                <div class="log-entry log-info">[说明] 一旦触发后，enable_workbench_=false，之后每次点工作台Tab都会: reload → 检测到target=out → 跳外部 → 切走</div>
            </div>
        </div>
    </div>
    
    <!-- 外部浏览器弹窗 -->
    <div class="overlay" id="overlay" onclick="closePopup()"></div>
    <div class="external-popup" id="externalPopup">
        <h3>🌐 已在外部浏览器打开</h3>
        <p id="externalUrl"></p>
        <p style="color: #ff4d4f; font-size: 13px;" id="popupHint"></p>
        <button onclick="closePopup()">关闭（模拟用户回到企微）</button>
    </div>

    <script>
        // === 状态管理 ===
        let enableWorkbench = true;
        let currentPage = 'workbench';
        let jumpCount = 0;
        let isFirstLoad = true;  // 首次加载还没触发过
        // 记录工作台当前实际加载的URL（模拟webview的load_url_）
        let workbenchLoadUrl = 'https://oa.example.com/workbench/home';

        // === 页面内容 ===

        // urlA: 工作台首页（用户配置的正常页面）
        function renderPageA() {
            return `
                <div class="page-a">
                    <h2>📋 自定义工作台首页（urlA）</h2>
                    <p>这是企业管理员配置的工作台首页。页面内通过 JS 或链接跳转到带 <code>target=out</code> 的二级页面。</p>
                    <p><strong>当前URL：</strong><code>https://oa.example.com/workbench/home</code></p>
                    
                    <div class="links">
                        <h3 style="margin-bottom: 12px; color: #333;">模拟触发方式：</h3>
                        
                        <a href="#" onclick="userClicksLinkWithTargetOut(); return false;">
                            🔗 用户点击链接 → 跳转到带 target=out 的 urlB<br>
                            <small style="color: #999;">模拟：页面内有个链接 https://oa.example.com/approval?target=out</small>
                        </a>
                        
                        <a href="#" onclick="simulateAutoRedirect(); return false;">
                            ⚡ 模拟 JS 自动重定向到带 target=out 的 URL<br>
                            <small style="color: #999;">模拟：页面 onload 后自动 location.href = urlB（带 target=out）</small>
                        </a>
                        
                        <a href="#" onclick="navigateNormal(); return false;">
                            ✅ 正常链接（无 target=out）— 对照组<br>
                            <small style="color: #999;">→ https://oa.example.com/attendance（正常在内部加载）</small>
                        </a>
                    </div>
                    
                    <div style="margin-top: 24px; padding: 16px; background: #fff7e6; border: 1px solid #ffd591; border-radius: 6px;">
                        <strong>💡 Bug 复现步骤：</strong>
                        <ol style="margin-top: 8px; padding-left: 20px; line-height: 2;">
                            <li>点击第一个或第二个链接，触发 target=out 跳转</li>
                            <li>关闭"外部浏览器"弹窗（模拟用户回到企微窗口）</li>
                            <li>再点击左侧"工作台"Tab — <b>每次都会再跳外部！</b></li>
                            <li>因为 enable_workbench_=false 后，onTabContentShow 会 reload → 再次命中 target=out</li>
                        </ol>
                    </div>
                </div>
            `;
        }

        // === 核心 Bug 逻辑 ===

        /**
         * 模拟 InnerWebview::openOuterWebIfTargetOut
         * 检查 URL 是否包含 target=out，如果是则跳外部浏览器
         */
        function openOuterWebIfTargetOut(url) {
            log('info', `[InnerWebview::openOuterWebIfTargetOut] checking url: ${url}`);
            if (url.includes('target=out')) {
                log('warn', `[openOuterWebIfTargetOut] url target = out, open outer webview`);
                openOuterWeb(url);
                return true;
            }
            return false;
        }

        /**
         * 模拟跳转到外部浏览器 + 触发 onOpenOuterWeb 信号
         */
        function openOuterWeb(url) {
            jumpCount++;
            document.getElementById('jumpCount').textContent = jumpCount;
            
            log('warn', `[InnerWebview] emit onOpenOuterWeb → 外部浏览器打开: ${url}`);
            
            // 显示"外部浏览器"弹窗
            document.getElementById('externalUrl').textContent = url;
            document.getElementById('externalPopup').classList.add('show');
            document.getElementById('overlay').classList.add('show');
            
            if (isFirstLoad) {
                document.getElementById('popupHint').innerHTML = 
                    '⚠️ 首次触发！此时 WorkspaceApplicationView 收到 onOpenOuterWeb 信号<br>' +
                    '→ setEnableWorkbench(false)<br>' +
                    '→ switchMainWindowToTab(消息)<br>' +
                    '之后每次点工作台Tab都会重复此流程';
            } else {
                document.getElementById('popupHint').innerHTML = 
                    '🔁 又跳了！因为 enable_workbench_=false<br>' +
                    '→ onTabContentShow() → reloadUrl() → 命中 target=out → 又跳外部<br>' +
                    '用户永远进不去工作台页面';
            }
            
            // 模拟 WorkspaceApplicationView 处理 onOpenOuterWeb 信号
            handleOnOpenOuterWeb();
        }

        /**
         * 模拟 WorkspaceApplicationView 中 connect(onOpenOuterWeb) 的处理
         * 关键代码：workspace_application_view.cpp 第 197-232 行
         */
        function handleOnOpenOuterWeb() {
            log('error', `[WorkspaceApplicationView] onOpenOuterWeb signal received`);
            
            if (isFirstLoad) {
                // appType() == kWorkbench 时的处理
                log('error', `[workbench] appType == kWorkbench → setEnableWorkbench(false)`);
                setEnableWorkbench(false);
                isFirstLoad = false;
            }
            
            // 切换到上一个 tab
            log('warn', `[workbench] switchMainWindowToTab(previous_tab = 消息)`);
            setTimeout(() => switchTab('chat', true), 300);
        }

        /**
         * 模拟 WorkbenchFrameImpl::onTabContentShow
         * 关键代码：workbench_frame_impl.cpp 第 177-188 行
         * 
         * 当 enable_workbench_ == false 时：
         *   1. content_view_->reloadUrl()  ← 重新加载工作台URL
         *   2. switchMainWindowToTab(previous_tab_)  ← 切回之前tab
         * 
         * 但 reloadUrl 会重新触发 OnBeforeBrowse → 检测到 target=out → 又跳外部
         */
        function onTabContentShow() {
            log('info', `[WorkbenchFrameImpl::onTabContentShow] enable_workbench_ = ${enableWorkbench}`);
            
            if (!enableWorkbench) {
                log('warn', `[onTabContentShow] !enable_workbench_ → content_view_->reloadUrl()`);
                log('warn', `[onTabContentShow] 重新加载URL: ${workbenchLoadUrl}`);
                
                // reloadUrl 会重新走 OnBeforeBrowse 流程
                // 如果工作台的URL（或跳转后的URL）带 target=out，就会再次触发外部跳转
                setTimeout(() => {
                    // 模拟重新加载后，webview 会导航到 urlB（因为页面会自动跳转）
                    // 这里模拟的是：工作台首页加载后，页面又跳到了带 target=out 的 URL
                    let reloadUrl = workbenchLoadUrl;
                    
                    // 关键：如果首页本身不带 target=out，但首页加载后会跳转到带 target=out 的 URL
                    // 这里我们模拟"页面加载后触发跳转"的场景
                    if (openOuterWebIfTargetOut(reloadUrl)) {
                        // 被拦截了
                        return;
                    }
                    
                    // 如果 reloadUrl 本身不带 target=out，但加载后 JS 跳转带 target=out 的URL
                    // 模拟延迟后的 JS 跳转
                    log('info', `[webview] 页面加载完成，JS 开始自动跳转...`);
                    setTimeout(() => {
                        let redirectUrl = 'https://oa.example.com/approval?target=out';
                        log('info', `[OnBeforeBrowse] 拦截到导航请求: ${redirectUrl}`);
                        openOuterWebIfTargetOut(redirectUrl);
                    }, 200);
                }, 100);
                
                return;
            }
            
            // 正常展示工作台
            log('info', `[onTabContentShow] enable_workbench_ = true, 正常显示工作台`);
            document.getElementById('webviewArea').innerHTML = renderPageA();
            document.getElementById('urlBar').textContent = workbenchLoadUrl;
        }

        // === 用户操作 ===

        function userClicksLinkWithTargetOut() {
            let url = 'https://oa.example.com/approval?target=out';
            log('info', `[用户操作] 点击链接，页面导航到: ${url}`);
            log('info', `[OnBeforeBrowse] request_url: ${url}`);
            
            // 更新工作台记录的URL（模拟 webview 内页面跳转后，再次加载时会跳到这个URL）
            workbenchLoadUrl = url;
            
            openOuterWebIfTargetOut(url);
        }

        function simulateAutoRedirect() {
            log('info', `[用户操作] 触发模拟：页面 JS 自动重定向`);
            log('info', `[页面JS] window.location.href = "https://oa.example.com/approval?target=out"`);
            
            // 记录跳转后的URL
            workbenchLoadUrl = 'https://oa.example.com/approval?target=out';
            
            setTimeout(() => {
                let url = 'https://oa.example.com/approval?target=out';
                log('info', `[OnBeforeBrowse] 拦截到导航请求: ${url}`);
                openOuterWebIfTargetOut(url);
            }, 300);
        }

        function navigateNormal() {
            let url = 'https://oa.example.com/attendance';
            log('info', `[用户操作] 点击正常链接: ${url}`);
            log('info', `[OnBeforeBrowse] request_url: ${url} → 无 target=out，正常加载`);
            
            document.getElementById('webviewArea').innerHTML = `
                <div class="page-a">
                    <h2>⏰ 考勤系统（正常页面）</h2>
                    <p>正常在工作台 webview 内加载，不触发外部跳转。</p>
                    <p><strong>当前URL：</strong><code>${url}</code></p>
                    <p style="color: #52c41a;">✅ 无 target=out，正常工作</p>
                </div>`;
            document.getElementById('urlBar').textContent = url;
        }

        // === Tab 切换 ===
        function switchTab(tab, isAutoSwitch = false) {
            // 清除所有 active
            document.querySelectorAll('.sidebar .tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            currentPage = tab;
            
            if (tab === 'workbench') {
                if (!isAutoSwitch) {
                    log('info', `[用户操作] 点击左侧"工作台"Tab`);
                }
                document.getElementById('sceneInfo').textContent = '场景：切换到工作台';
                document.getElementById('urlBar').textContent = workbenchLoadUrl;
                
                // 触发 onTabContentShow
                onTabContentShow();
                
            } else if (tab === 'chat') {
                document.getElementById('webviewArea').innerHTML = `
                    <div class="page-a">
                        <h2>💬 消息列表</h2>
                        <p style="color: #999;">（被切换到消息页面）</p>
                        ${!enableWorkbench ? '<p style="color: #ff4d4f; margin-top: 12px;">⚠️ 现在尝试点击左侧"工作台"Tab，观察每次都跳外部浏览器</p>' : ''}
                    </div>`;
                document.getElementById('urlBar').textContent = '消息';
                document.getElementById('sceneInfo').textContent = isAutoSwitch ? '场景：被强制切走' : '场景：消息页';
            } else {
                document.getElementById('webviewArea').innerHTML = `
                    <div class="page-a"><h2>👥 通讯录</h2><p style="color: #999;">通讯录页面</p></div>`;
                document.getElementById('urlBar').textContent = '通讯录';
                document.getElementById('sceneInfo').textContent = '场景：通讯录';
            }
        }

        // === 状态管理 ===
        function setEnableWorkbench(enabled) {
            enableWorkbench = enabled;
            const dot = document.getElementById('statusDot');
            const status = document.getElementById('workbenchStatus');
            
            if (enabled) {
                dot.className = 'status-dot green';
                status.textContent = 'enable_workbench_ = true';
            } else {
                dot.className = 'status-dot red';
                status.textContent = 'enable_workbench_ = false ⚠️';
            }
        }

        // === 辅助 ===
        function closePopup() {
            document.getElementById('externalPopup').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }

        function goBack() { log('info', '[Navigation] 后退'); }
        function refresh() { 
            if (currentPage === 'workbench') {
                log('info', '[Navigation] 用户刷新工作台');
                onTabContentShow();
            }
        }

        function resetDemo() {
            enableWorkbench = true;
            isFirstLoad = true;
            jumpCount = 0;
            workbenchLoadUrl = 'https://oa.example.com/workbench/home';
            setEnableWorkbench(true);
            document.getElementById('jumpCount').textContent = '0';
            switchTab('workbench');
            document.getElementById('logPanel').innerHTML = '<div class="log-entry log-info">[系统] Demo 已重置，enable_workbench_ = true</div>';
        }

        function log(level, msg) {
            const panel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${level}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${msg}`;
            panel.appendChild(entry);
            panel.scrollTop = panel.scrollHeight;
        }

        // === 初始化 ===
        document.getElementById('webviewArea').innerHTML = renderPageA();
    </script>
</body>
</html>
