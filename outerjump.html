<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>工作台首页</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f5f5f5; }
        button { margin: 10px 0; padding: 12px 20px; font-size: 14px; cursor: pointer; border: 1px solid #ddd; border-radius: 6px; background: #fff; }
        button:hover { background: #f0f7ff; }
        iframe { border: 1px solid #ddd; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>工作台首页</h1>
    <p>点击按钮后，页面内的 iframe 会加载带 <code>?webtarget=out</code> 的地址。</p>
    <p>客户端 OnBeforeBrowse 会拦截 iframe 导航（is_main_frame=0），检测到 target=out 后跳外部。</p>

    <button onclick="triggerIframe()">点击触发（iframe 加载带 webtarget=out 的URL）</button>

    <iframe id="subFrame" width="600" height="300" src="about:blank"></iframe>

    <script>
        function triggerIframe() {
            document.getElementById('subFrame').src = 'https://www.baidu.com/?webtarget=out';
        }
    </script>
</body>
</html>
