<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page A - Cookie 测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background: #f5f5f5; }
        h1 { color: #333; margin-bottom: 16px; font-size: 20px; }
        .card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .card h2 { font-size: 16px; color: #666; margin-bottom: 8px; }
        .cookie-display { background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 14px; word-break: break-all; min-height: 40px; color: #0369a1; }
        .cookie-display.empty { color: #94a3b8; font-style: italic; }
        .btn { display: inline-block; padding: 12px 24px; border-radius: 6px; border: none; font-size: 15px; font-weight: 500; cursor: pointer; margin: 6px 6px 6px 0; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-success { background: #16a34a; color: #fff; }
        .btn-warning { background: #ea580c; color: #fff; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn:active { opacity: 0.8; }
        .log { background: #1e293b; color: #e2e8f0; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; margin-top: 8px; }
        .log-entry { margin-bottom: 4px; }
        .log-time { color: #94a3b8; }
        .status { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin-left: 8px; }
        .status-ok { background: #dcfce7; color: #166534; }
        .status-fail { background: #fef2f2; color: #991b1b; }
        .status-waiting { background: #fef9c3; color: #854d0e; }
    </style>
</head>
<body>
    <h1>📄 Page A - Cookie 验证页</h1>

    <div class="card">
        <h2>🍪 当前 Cookie 状态</h2>
        <div id="cookieDisplay" class="cookie-display empty">加载中...</div>
        <div style="margin-top: 8px;">
            <span>标志 Cookie (test_flag):</span>
            <span id="flagStatus" class="status status-waiting">检查中</span>
        </div>
    </div>

    <div class="card">
        <h2>⚡ 操作</h2>
        <button class="btn btn-primary" onclick="setCookie()">1. 种下标志 Cookie</button>
        <button class="btn btn-success" onclick="openPageB()">2. 打开 Page B</button>
        <button class="btn btn-warning" onclick="refreshCookieDisplay()">3. 刷新 Cookie 显示</button>
        <button class="btn btn-danger" onclick="clearAllCookies()">清除所有 Cookie</button>
    </div>

    <div class="card">
        <h2>📝 操作日志</h2>
        <div id="logArea" class="log">
            <div class="log-entry"><span class="log-time">[等待操作]</span> 页面已加载</div>
        </div>
    </div>

    <div class="card">
        <h2>📋 测试步骤</h2>
        <ol style="padding-left: 20px; line-height: 2; color: #555;">
            <li>点击 <b>"种下标志 Cookie"</b> → 设置 test_flag=page_a_alive_时间戳</li>
            <li>点击 <b>"打开 Page B"</b> → 在新窗口打开 B 页面</li>
            <li>在 B 页面点击 <b>"调用 wx.closeWindow"</b></li>
            <li>回到本页面，点击 <b>"刷新 Cookie 显示"</b></li>
            <li>检查 test_flag cookie 是否还在</li>
        </ol>
    </div>

    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
    <script>
        const COOKIE_NAME = 'test_flag';
        const COOKIE_VALUE_PREFIX = 'page_a_alive_';

        function log(msg) {
            const logArea = document.getElementById('logArea');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function getCookieValue(name) {
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            return match ? decodeURIComponent(match[2]) : null;
        }

        function refreshCookieDisplay() {
            const display = document.getElementById('cookieDisplay');
            const flagStatus = document.getElementById('flagStatus');
            const allCookies = document.cookie;

            if (allCookies) {
                display.textContent = allCookies;
                display.classList.remove('empty');
            } else {
                display.textContent = '(无 cookie)';
                display.classList.add('empty');
            }

            const flagValue = getCookieValue(COOKIE_NAME);
            if (flagValue) {
                flagStatus.textContent = '✅ 存在: ' + flagValue;
                flagStatus.className = 'status status-ok';
                log('✅ 标志 Cookie 存在: ' + flagValue);
            } else {
                flagStatus.textContent = '❌ 不存在 / 已被清除';
                flagStatus.className = 'status status-fail';
                log('❌ 标志 Cookie 不存在或已被清除!');
            }
        }

        function setCookie() {
            const value = COOKIE_VALUE_PREFIX + Date.now();
            // 设置 cookie，path=/ 确保全局可见，max-age 1小时
            document.cookie = `${COOKIE_NAME}=${encodeURIComponent(value)}; path=/; max-age=3600`;
            // 额外设置一个辅助 cookie
            document.cookie = `test_extra=extra_data_${Date.now()}; path=/; max-age=3600`;
            log(`🍪 已设置 Cookie: ${COOKIE_NAME}=${value}`);
            log(`🍪 已设置 Cookie: test_extra=extra_data_...`);
            refreshCookieDisplay();
        }

        function openPageB() {
            const currentCookies = document.cookie;
            log('🚀 正在打开 Page B...');
            log('📤 当前携带的 Cookies: ' + (currentCookies || '(无)'));
            
            // 获取当前页面的基础路径来构建 B 页面的 URL
            const baseUrl = window.location.href.replace('page_a.html', '');
            const pageBUrl = baseUrl + 'page_b.html';
            
            // 尝试通过企业微信 JSAPI 打开，如果不支持则用 window.open
            window.open(pageBUrl, '_blank');
            log('✅ Page B 已打开（新窗口）');
        }

        function clearAllCookies() {
            const cookies = document.cookie.split(';');
            for (let c of cookies) {
                const name = c.split('=')[0].trim();
                document.cookie = name + '=; path=/; max-age=0';
            }
            log('🗑️ 已清除所有 Cookie');
            refreshCookieDisplay();
        }

        // 页面加载时刷新显示
        window.addEventListener('load', () => {
            log('📄 Page A 已加载');
            refreshCookieDisplay();
        });

        // 页面可见性变化时（从B页面切回来时）自动刷新
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                log('👁️ 页面重新可见，自动刷新 Cookie 状态...');
                refreshCookieDisplay();
            }
        });

        // 窗口获得焦点时也刷新
        window.addEventListener('focus', () => {
            log('🔄 窗口获得焦点，自动刷新 Cookie 状态...');
            refreshCookieDisplay();
        });
    </script>
</body>
</html>
